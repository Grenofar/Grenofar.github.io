<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>GRNFR Agent IA</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="https://lh3.googleusercontent.com/a/ACg8ocI6ACyrLsGHgCjTCFaY8q1aFRVVD6LRWS4G7bDmSnmH_vKPW5-v=s288-c-no" type="image/png">
</head>

<body>

<div class="navbar">
    <div class="logo">GRNFR</div>
    <div class="menu">
        <a href="https://grenofar.github.io">Site Principal</a>
    </div>
</div>

<div>
    <h1>Agent IA</h1>

    <input id="input" placeholder="Écris ici...">
    <button class="btn" onclick="send()">Envoyer</button>

    <h2 id="loading" style="display:none;">Chargement...</h2>

    <p id="result" style="font-size:20px; font-weight:bold;"></p>
</div>

<script>
async function send() {
    const input = document.getElementById("input");
    const loading = document.getElementById("loading");
    const result = document.getElementById("result");

    let text = input.value;

    if (!text.trim()) return;

    // UI reset
    loading.style.display = "block";
    result.style.display = "none";
    result.innerText = "";

    try {
        const url = "https://grnfrscripts.pythonanywhere.com/ai?q=" + encodeURIComponent(text);

        const res = await fetch(url);

        const data = await res.json();

        if (!data.response) {
            throw new Error("Réponse API invalide");
        }

        result.innerText = data.response;

    } catch (err) {
        console.error(err);
        result.innerText = "❌ Erreur API ou connexion";
    }

    loading.style.display = "none";
    result.style.display = "block";
}
</script>

</body>
</html>
