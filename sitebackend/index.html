<!DOCTYPE html>
<html>
<head>

<body>

<div class="navbar">
    <div class="logo">GRNFR</div>
    <div class="menu">
        <a href="https://grenofar.github.io">Site Principal</a>
    </div>
</div>

<div>
    <button onclick="loadMessage()">Clique ici</button>
    <p id="result"></p>
</div>

<script>
async function loadMessage() {
    let res = await fetch("https://grnfrscripts.pythonanywhere.com/message");
    let data = await res.text();
    document.getElementById("result").innerText = data;
}
</script>
