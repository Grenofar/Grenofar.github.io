<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>GRNFR Agent IA</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="https://lh3.googleusercontent.com/a/ACg8ocI6ACyrLsGHgCjTCFaY8q1aFRVVD6LRWS4G7bDmSnmH_vKPW5-v=s288-c-no" type="image/png">
</head>

<body>

<div class="navbar">
    <div class="logo">GRNFR</div>
    <div class="menu">
        <a href="https://grenofar.github.io">Site Principal</a>
    </div>
</div>
<div>
    <h1>Entrer un code</h1>

    <input id="code" placeholder="Tape le code">
    <button class=btn onclick="verify()">Valider</button>

    <p id="result"></p>
    <div   id="button"></div>
</div>
<script>
async function verify() {
    let code = document.getElementById("code").value;

    let res = await fetch(`https://remembered-benefits-record-dean.trycloudflare.com/check?code=${encodeURIComponent(code)}`);
    let data = await res.json();
    
    let result = document.getElementById("result");
    let button = document.getElementById("button");

    button.innerHTML = "";

    if (data.ok) {
        result.innerText = "Code correct ✅";

        button.innerHTML = `
            <a href="${data.link}" target="_blank">
                <button>Aller vers le lien</button>
            </a>
        `;
    } else {
        result.innerText = "Code incorrect ❌";
    }
}
</script>

</body>
</html>
