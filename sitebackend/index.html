<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>GRNFR Agent IA</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="https://lh3.googleusercontent.com/a/ACg8ocI6ACyrLsGHgCjTCFaY8q1aFRVVD6LRWS4G7bDmSnmH_vKPW5-v=s288-c-no" type="image/png">
</head>

<body>

<div class="navbar">
    <div class="logo">GRNFR</div>
    <div class="menu">
        <a href="https://grenofar.github.io">Site Principal</a>
    </div>
</div>

<div>
    <button onclick="loadMessage()">Clique ici</button>

    <p id="loading" style="display:none;">Chargement...</p>
    <p id="result"></p>
</div>

<script>
async function loadMessage() {
    const result = document.getElementById("result");
    const loading = document.getElementById("loading");

    try {
        loading.style.display = "block";
        result.innerText = "";

        const res = await fetch("https://grenofar-github-io.onrender.com/message");
        const data = await res.json(); // ✅ FIX IMPORTANT

        loading.style.display = "none";
        result.innerText = data.text;

    } catch (err) {
        loading.style.display = "none";
        result.innerText = "Erreur backend ❌";
        console.error(err);
    }
}
</script>

</body>
</html>
