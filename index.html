    <button onclick="AfficherFen2()" style="background-color: rgb(43, 177, 31); color: rgb(0, 0, 0); border: none; padding: 10px 15px; border-radius: 5px;">

<script>

function Retour2Fen1() {
    document.getElementById('fen3').style.display = 'none';
